<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Comment Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  .character {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .character .bubble {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: rgba(255, 255, 255, 0.95);
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 28px;
    line-height: 1.4;
    width: max-content;
    max-width: 500px;
    word-wrap: break-word;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transform-origin: bottom center;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  .character .bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid rgba(255, 255, 255, 0.95);
  }
  .character .bubble.visible {
    transform: translateX(-50%) scale(1);
  }

  .character .bubble img {
    height: 1.2em;
    vertical-align: middle;
  }

  .character .avatar {
    width: 112px;
    height: 112px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    object-fit: cover;
  }

  .character .name {
    margin-top: 2px;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    text-shadow:
      -2px -2px 0 #000,
       2px -2px 0 #000,
      -2px  2px 0 #000,
       2px  2px 0 #000,
       0   -2px 0 #000,
       0    2px 0 #000,
      -2px  0   0 #000,
       2px  0   0 #000;
    text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>
<script src="http://localhost:11180/templates/preset/__origin/js/onesdk.js"></script>
<script>
const BUBBLE_DURATION = 10000;
const WANDER_FORCE = 0.3;
const WANDER_INTERVAL_MIN = 2000;
const WANDER_INTERVAL_MAX = 6000;
const FRICTION = 0.98;
const WALL_BOUNCE = 0.7;
const EXCITED_FORCE = 5;
const EXCITED_MS_PER_CHAR = 150;
const MARGIN = 112;
const CHAR_WIDTH = 140;
const CHAR_HEIGHT = 160;
const BASE_MASS = 1;

const BASE_AVATAR_SIZE = 112;
const MIN_AVATAR_SCALE = 0.5;
const MAX_AVATAR_SCALE = 3;

const characters = {};
let totalComments = 0;

function stripHtml(html) {
  return html
    .replace(/<img[^>]*alt="([^"]*)"[^>]*>/g, '$1')
    .replace(/<[^>]+>/g, '');
}

// 表示文字数カウント（絵文字imgは1文字扱い）
function countChars(html) {
  return html
    .replace(/<img[^>]*>/g, 'X')  // imgタグを1文字に
    .replace(/<[^>]+>/g, '')       // 残りのHTMLタグを除去
    .length;
}

function sanitizeHtml(html) {
  // imgタグは保持（絵文字用）、それ以外のHTMLタグは除去
  return html.replace(/<(?!img\s)[^>]+>/g, '');
}

function handleComment(comment) {
  const userId = comment.data.userId;
  const name = comment.data.nickname || comment.data.displayName || comment.data.name;
  const profileImage = comment.data.profileImage;
  const text = stripHtml(comment.data.comment);
  const allNames = [
    comment.data.nickname,
    comment.data.displayName,
    comment.data.name,
  ].filter(Boolean);

  if (!characters[userId]) {
    createCharacter(userId, name, profileImage, allNames);
  }

  showBubble(userId, text);
}

function createCharacter(userId, name, profileImage, allNames) {
  // 高解像度画像を取得（YouTube等のs32をs256に置換）
  profileImage = profileImage.replace(/=s\d+/, '=s256');
  const el = document.createElement('div');
  el.className = 'character';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  el.appendChild(bubble);

  const avatar = document.createElement('img');
  avatar.className = 'avatar';
  avatar.src = profileImage;
  avatar.alt = name;
  avatar.crossOrigin = 'anonymous';
  el.appendChild(avatar);

  const nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = name;
  el.appendChild(nameEl);

  const rangeX = Math.max(0, window.innerWidth - CHAR_WIDTH - MARGIN * 2);
  const rangeY = Math.max(0, window.innerHeight - CHAR_HEIGHT - MARGIN * 2);
  const startX = MARGIN + Math.random() * rangeX;
  const startY = MARGIN + Math.random() * rangeY;
  el.style.left = startX + 'px';
  el.style.top = startY + 'px';

  document.body.appendChild(el);

  characters[userId] = {
    el,
    bubble,
    avatar,
    x: startX,
    y: startY,
    vx: 0,
    vy: 0,
    bubbleTimer: null,
    commentCount: 0,
    names: allNames || [],
  };

  startWandering(userId);
}

function updateAvatarSizes() {
  if (totalComments === 0) return;
  for (const userId in characters) {
    const char = characters[userId];
    const ratio = char.commentCount / totalComments;
    // MIN_AVATAR_SCALE 〜 MAX_AVATAR_SCALE にスケール
    const scale = MIN_AVATAR_SCALE + ratio * (MAX_AVATAR_SCALE - MIN_AVATAR_SCALE);
    const size = Math.round(BASE_AVATAR_SIZE * scale);
    char.avatar.style.width = size + 'px';
    char.avatar.style.height = size + 'px';
    // 吹き出し位置をアバターサイズに合わせる
    char.bubble.style.bottom = (size + 30) + 'px';
  }
}

function showBubble(userId, rawHtml) {
  const char = characters[userId];
  if (!char) return;

  if (char.bubbleTimer) clearTimeout(char.bubbleTimer);

  const charCount = countChars(rawHtml);

  // 吹き出し表示時間：文字数に応じて長く
  const bubbleDuration = Math.max(BUBBLE_DURATION, charCount * EXCITED_MS_PER_CHAR);

  // 興奮状態：吹き出しが消えるまで走り回る、文字数が多いほど速い
  char.excitedUntil = Date.now() + bubbleDuration;
  char.excitedSpeed = EXCITED_FORCE + Math.pow(charCount, 2) * 0.01;

  // 名前が含まれていたらその人に突進
  const plainText = stripHtml(rawHtml);
  const targets = [];
  for (const otherId in characters) {
    if (otherId === userId) continue;
    const other = characters[otherId];
    const matched = other.names.some(n => plainText.includes(n));
    if (matched) {
      targets.push(otherId);
    }
  }
  if (targets.length > 0) {
    char.chargeTarget = targets[Math.floor(Math.random() * targets.length)];
    char.chargeUntil = char.excitedUntil;
  } else {
    char.chargeTarget = null;
  }

  // フォントサイズ調整：4行以上になりそうなら縮小
  const baseSize = 28;
  const maxCharsPerLine = 12;
  const lines = Math.ceil(charCount / maxCharsPerLine);
  if (lines > 4) {
    const scale = Math.max(0.5, 4 / lines);
    char.bubble.style.fontSize = Math.round(baseSize * scale) + 'px';
  } else {
    char.bubble.style.fontSize = baseSize + 'px';
  }

  char.bubble.innerHTML = sanitizeHtml(rawHtml);
  char.bubble.classList.add('visible');

  char.bubbleTimer = setTimeout(() => {
    char.bubble.classList.remove('visible');
    char.bubbleTimer = null;
  }, bubbleDuration);
}

function startWandering(userId) {
  const wander = () => {
    const char = characters[userId];
    if (!char) return;

    const delay = WANDER_INTERVAL_MIN + Math.random() * (WANDER_INTERVAL_MAX - WANDER_INTERVAL_MIN);

    setTimeout(() => {
      if (!characters[userId]) return;

      if (Math.random() < 0.5) {
        // ランダムな方向に軽く力を加える
        const angle = Math.random() * Math.PI * 2;
        char.vx += Math.cos(angle) * WANDER_FORCE;
        char.vy += Math.sin(angle) * WANDER_FORCE;
      }

      wander();
    }, delay);
  };

  wander();
}

function getMass(char) {
  return BASE_MASS + char.commentCount * 0.5;
}

function animate() {
  const ids = Object.keys(characters);

  // 興奮中のキャラに力を加える
  const now = Date.now();
  for (const userId of ids) {
    const char = characters[userId];
    if (!char.excitedUntil || now >= char.excitedUntil) continue;

    const force = (char.excitedSpeed || EXCITED_FORCE) * 0.3;

    // 突進ターゲットがいればその方向に、いなければランダム
    if (char.chargeTarget && characters[char.chargeTarget] && now < char.chargeUntil) {
      const target = characters[char.chargeTarget];
      const dx = target.x - char.x;
      const dy = target.y - char.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0) {
        char.vx += (dx / dist) * force;
        char.vy += (dy / dist) * force;
      }
    } else {
      const angle = Math.random() * Math.PI * 2;
      char.vx += Math.cos(angle) * force;
      char.vy += Math.sin(angle) * force;
    }
  }

  // 衝突判定 & 運動量交換
  for (let i = 0; i < ids.length; i++) {
    const a = characters[ids[i]];
    const aRadius = (a.avatar.offsetWidth || BASE_AVATAR_SIZE) / 2;
    const aMass = getMass(a);
    for (let j = i + 1; j < ids.length; j++) {
      const b = characters[ids[j]];
      const bRadius = (b.avatar.offsetWidth || BASE_AVATAR_SIZE) / 2;
      const bMass = getMass(b);

      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = aRadius + bRadius;

      if (dist < minDist && dist > 0) {
        const nx = dx / dist;
        const ny = dy / dist;

        // 重なり解消
        const overlap = minDist - dist;
        const totalMass = aMass + bMass;
        a.x -= nx * overlap * (bMass / totalMass);
        a.y -= ny * overlap * (bMass / totalMass);
        b.x += nx * overlap * (aMass / totalMass);
        b.y += ny * overlap * (aMass / totalMass);

        // 相対速度の法線成分
        const dvx = a.vx - b.vx;
        const dvy = a.vy - b.vy;
        const dvDotN = dvx * nx + dvy * ny;

        // 離れていく方向なら衝突処理不要
        if (dvDotN > 0) {
          const impulse = (2 * dvDotN) / totalMass;
          a.vx -= impulse * bMass * nx;
          a.vy -= impulse * bMass * ny;
          b.vx += impulse * aMass * nx;
          b.vy += impulse * aMass * ny;
        }
      }
    }
  }

  // 位置更新 & 壁バウンス
  for (const userId of ids) {
    const char = characters[userId];

    // 摩擦
    char.vx *= FRICTION;
    char.vy *= FRICTION;

    // 位置更新
    char.x += char.vx;
    char.y += char.vy;

    // 壁バウンス
    const minX = MARGIN;
    const maxX = window.innerWidth - CHAR_WIDTH - MARGIN;
    const minY = MARGIN;
    const maxY = window.innerHeight - CHAR_HEIGHT - MARGIN;

    if (char.x < minX) { char.x = minX; char.vx = Math.abs(char.vx) * WALL_BOUNCE; }
    if (char.x > maxX) { char.x = maxX; char.vx = -Math.abs(char.vx) * WALL_BOUNCE; }
    if (char.y < minY) { char.y = minY; char.vy = Math.abs(char.vy) * WALL_BOUNCE; }
    if (char.y > maxY) { char.y = maxY; char.vy = -Math.abs(char.vy) * WALL_BOUNCE; }

    char.el.style.left = char.x + 'px';
    char.el.style.top = char.y + 'px';
  }

  requestAnimationFrame(animate);
}

// OneSDKで接続
const seenCommentIds = new Set();
OneSDK.setup({ mode: 'all' });
OneSDK.subscribe({
  action: 'comments',
  callback: (comments) => {
    for (const comment of comments) {
      const commentId = comment.data.id;
      const userId = comment.data.userId;
      const name = comment.data.nickname || comment.data.displayName || comment.data.name;
      const profileImage = comment.data.profileImage;
      const allNames = [
        comment.data.nickname,
        comment.data.displayName,
        comment.data.name,
      ].filter(Boolean);
      if (!characters[userId]) {
        createCharacter(userId, name, profileImage, allNames);
      }
      // 未処理のコメントだけカウント＆吹き出し表示
      if (!seenCommentIds.has(commentId)) {
        seenCommentIds.add(commentId);
        characters[userId].commentCount++;
        totalComments++;
        showBubble(userId, comment.data.comment);
      }
    }
    updateAvatarSizes();
  }
});
OneSDK.connect();

animate();
</script>
</body>
</html>
