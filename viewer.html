<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Comment Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  .character {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .character .bubble {
    position: absolute;
    bottom: 140px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 28px;
    line-height: 1.4;
    min-width: 336px;
    max-width: 500px;
    word-wrap: break-word;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transform: scale(0);
    transform-origin: bottom center;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: pre-wrap;
  }
  .character .bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid rgba(255, 255, 255, 0.95);
  }
  .character .bubble.visible {
    transform: scale(1);
  }

  .character .avatar {
    width: 112px;
    height: 112px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    object-fit: cover;
  }

  .character .name {
    margin-top: 2px;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    text-shadow:
      -2px -2px 0 #000,
       2px -2px 0 #000,
      -2px  2px 0 #000,
       2px  2px 0 #000,
       0   -2px 0 #000,
       0    2px 0 #000,
      -2px  0   0 #000,
       2px  0   0 #000;
    text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>
<script src="http://localhost:11180/templates/preset/__origin/js/onesdk.js"></script>
<script>
const BUBBLE_DURATION = 10000;
const MOVE_INTERVAL_MIN = 2000;
const MOVE_INTERVAL_MAX = 6000;
const SPEED = 1.5;
const FLEE_SPEED = 4;
const PERSONAL_SPACE = 200;
const FLEE_DURATION = 2000;
const CHAR_WIDTH = 140;
const CHAR_HEIGHT = 160;

const characters = {};

function stripHtml(html) {
  return html
    .replace(/<img[^>]*alt="([^"]*)"[^>]*>/g, '$1')
    .replace(/<[^>]+>/g, '');
}

function handleComment(comment) {
  const userId = comment.data.userId;
  const name = comment.data.nickname || comment.data.displayName || comment.data.name;
  const profileImage = comment.data.profileImage;
  const text = stripHtml(comment.data.comment);

  if (!characters[userId]) {
    createCharacter(userId, name, profileImage);
  }

  showBubble(userId, text);
}

function createCharacter(userId, name, profileImage) {
  const el = document.createElement('div');
  el.className = 'character';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  el.appendChild(bubble);

  const avatar = document.createElement('img');
  avatar.className = 'avatar';
  avatar.src = profileImage;
  avatar.alt = name;
  avatar.crossOrigin = 'anonymous';
  el.appendChild(avatar);

  const nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = name;
  el.appendChild(nameEl);

  const startX = Math.random() * (window.innerWidth - CHAR_WIDTH);
  const startY = Math.random() * (window.innerHeight - CHAR_HEIGHT);
  el.style.left = startX + 'px';
  el.style.top = startY + 'px';

  document.body.appendChild(el);

  characters[userId] = {
    el,
    bubble,
    x: startX,
    y: startY,
    targetX: startX,
    targetY: startY,
    moving: false,
    bubbleTimer: null,
  };

  startWandering(userId);
}

function showBubble(userId, text) {
  const char = characters[userId];
  if (!char) return;

  if (char.bubbleTimer) clearTimeout(char.bubbleTimer);

  char.bubble.textContent = text;
  char.bubble.classList.add('visible');

  // 吹き出しが画面外にはみ出さないよう位置調整
  requestAnimationFrame(() => snapBubble(char));

  char.bubbleTimer = setTimeout(() => {
    char.bubble.classList.remove('visible');
    char.bubbleTimer = null;
  }, BUBBLE_DURATION);
}

function snapBubble(char) {
  const bubble = char.bubble;
  const charRect = char.el.getBoundingClientRect();
  const bubbleWidth = bubble.offsetWidth;

  // キャラ中央を基準に吹き出しを中央寄せ
  const charCenterX = char.x + CHAR_WIDTH / 2;
  let bubbleLeft = charCenterX - bubbleWidth / 2;

  // 画面左右にスナップ
  if (bubbleLeft < 0) bubbleLeft = 0;
  if (bubbleLeft + bubbleWidth > window.innerWidth) {
    bubbleLeft = window.innerWidth - bubbleWidth;
  }

  // キャラのleftからの相対位置に変換
  bubble.style.left = (bubbleLeft - char.x) + 'px';

  // 上にはみ出す場合はキャラの下に表示
  const bubbleHeight = bubble.offsetHeight;
  const bubbleTop = char.y - bubbleHeight - 10;
  if (bubbleTop < 0) {
    bubble.style.bottom = 'auto';
    bubble.style.top = (CHAR_HEIGHT + 10) + 'px';
  } else {
    bubble.style.bottom = '140px';
    bubble.style.top = 'auto';
  }
}

function startWandering(userId) {
  const wander = () => {
    const char = characters[userId];
    if (!char) return;

    const delay = MOVE_INTERVAL_MIN + Math.random() * (MOVE_INTERVAL_MAX - MOVE_INTERVAL_MIN);

    setTimeout(() => {
      if (!characters[userId]) return;

      if (Math.random() < 0.5) {
        wander();
        return;
      }

      const maxX = window.innerWidth - CHAR_WIDTH;
      const maxY = window.innerHeight - CHAR_HEIGHT;
      char.targetX = Math.random() * maxX;
      char.targetY = Math.random() * maxY;
      char.moving = true;

      wander();
    }, delay);
  };

  wander();
}

function animate() {
  const ids = Object.keys(characters);
  const now = Date.now();

  for (const userId of ids) {
    const char = characters[userId];

    // 他キャラとの距離チェック → 近すぎたら逃げ先を決めて一定時間早足モードに
    for (const otherId of ids) {
      if (otherId === userId) continue;
      const other = characters[otherId];
      const dx = char.x - other.x;
      const dy = char.y - other.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < PERSONAL_SPACE && dist > 0 && (!char.fleeUntil || now > char.fleeUntil)) {
        // 反対方向に逃げ先を設定
        const awayX = char.x + (dx / dist) * PERSONAL_SPACE * 1.5;
        const awayY = char.y + (dy / dist) * PERSONAL_SPACE * 1.5;
        char.targetX = Math.max(0, Math.min(window.innerWidth - CHAR_WIDTH, awayX));
        char.targetY = Math.max(0, Math.min(window.innerHeight - CHAR_HEIGHT, awayY));
        char.moving = true;
        char.fleeUntil = now + FLEE_DURATION;
        break;
      }
    }

    if (!char.moving) {
      char.el.style.left = char.x + 'px';
      char.el.style.top = char.y + 'px';
      continue;
    }

    const dx = char.targetX - char.x;
    const dy = char.targetY - char.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const isFleeing = char.fleeUntil && now < char.fleeUntil;
    const speed = isFleeing ? FLEE_SPEED : SPEED;

    if (dist < speed) {
      char.x = char.targetX;
      char.y = char.targetY;
      char.moving = false;
    } else {
      char.x += (dx / dist) * speed;
      char.y += (dy / dist) * speed;
    }

    char.el.style.left = char.x + 'px';
    char.el.style.top = char.y + 'px';
    if (char.bubble.classList.contains('visible')) snapBubble(char);
  }

  requestAnimationFrame(animate);
}

// OneSDKで接続
const seenCommentIds = new Set();
OneSDK.setup({ mode: 'all' });
OneSDK.subscribe({
  action: 'comments',
  callback: (comments) => {
    for (const comment of comments) {
      const commentId = comment.data.id;
      const userId = comment.data.userId;
      const name = comment.data.nickname || comment.data.displayName || comment.data.name;
      const profileImage = comment.data.profileImage;
      if (!characters[userId]) {
        createCharacter(userId, name, profileImage);
      }
      // 未処理のコメントだけ吹き出しを表示
      if (!seenCommentIds.has(commentId)) {
        seenCommentIds.add(commentId);
        showBubble(userId, stripHtml(comment.data.comment));
      }
    }
  }
});
OneSDK.connect();

animate();
</script>
</body>
</html>
