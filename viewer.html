<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Comment Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  .character {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .character .bubble {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.95);
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 28px;
    line-height: 1.4;
    min-width: 180px;
    max-width: 360px;
    word-wrap: break-word;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: pre-wrap;
  }
  .character .bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid rgba(255, 255, 255, 0.95);
  }
  .character .bubble.visible {
    opacity: 1;
  }

  .character .avatar {
    width: 112px;
    height: 112px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    object-fit: cover;
  }

  .character .name {
    margin-top: 2px;
    font-size: 22px;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    text-align: center;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>
<script src="http://localhost:11180/templates/preset/__origin/js/onesdk.js"></script>
<script>
const BUBBLE_DURATION = 6000;
const MOVE_INTERVAL_MIN = 2000;
const MOVE_INTERVAL_MAX = 6000;
const SPEED = 1.5;
const CHAR_WIDTH = 140;
const CHAR_HEIGHT = 160;

const characters = {};

function stripHtml(html) {
  return html
    .replace(/<img[^>]*alt="([^"]*)"[^>]*>/g, '$1')
    .replace(/<[^>]+>/g, '');
}

function handleComment(comment) {
  const userId = comment.data.userId;
  const name = comment.data.nickname || comment.data.displayName || comment.data.name;
  const profileImage = comment.data.profileImage;
  const text = stripHtml(comment.data.comment);

  if (!characters[userId]) {
    createCharacter(userId, name, profileImage);
  }

  showBubble(userId, text);
}

function createCharacter(userId, name, profileImage) {
  const el = document.createElement('div');
  el.className = 'character';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  el.appendChild(bubble);

  const avatar = document.createElement('img');
  avatar.className = 'avatar';
  avatar.src = profileImage;
  avatar.alt = name;
  avatar.crossOrigin = 'anonymous';
  el.appendChild(avatar);

  const nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = name;
  el.appendChild(nameEl);

  const startX = Math.random() * (window.innerWidth - CHAR_WIDTH);
  const startY = Math.random() * (window.innerHeight - CHAR_HEIGHT);
  el.style.left = startX + 'px';
  el.style.top = startY + 'px';

  document.body.appendChild(el);

  characters[userId] = {
    el,
    bubble,
    x: startX,
    y: startY,
    targetX: startX,
    targetY: startY,
    moving: false,
    bubbleTimer: null,
  };

  startWandering(userId);
}

function showBubble(userId, text) {
  const char = characters[userId];
  if (!char) return;

  if (char.bubbleTimer) clearTimeout(char.bubbleTimer);

  char.bubble.textContent = text;
  char.bubble.classList.add('visible');

  char.bubbleTimer = setTimeout(() => {
    char.bubble.classList.remove('visible');
    char.bubbleTimer = null;
  }, BUBBLE_DURATION);
}

function startWandering(userId) {
  const wander = () => {
    const char = characters[userId];
    if (!char) return;

    const delay = MOVE_INTERVAL_MIN + Math.random() * (MOVE_INTERVAL_MAX - MOVE_INTERVAL_MIN);

    setTimeout(() => {
      if (!characters[userId]) return;

      if (Math.random() < 0.5) {
        wander();
        return;
      }

      const maxX = window.innerWidth - CHAR_WIDTH;
      const maxY = window.innerHeight - CHAR_HEIGHT;
      char.targetX = Math.random() * maxX;
      char.targetY = Math.random() * maxY;
      char.moving = true;

      wander();
    }, delay);
  };

  wander();
}

function animate() {
  for (const userId in characters) {
    const char = characters[userId];
    if (!char.moving) continue;

    const dx = char.targetX - char.x;
    const dy = char.targetY - char.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < SPEED) {
      char.x = char.targetX;
      char.y = char.targetY;
      char.moving = false;
    } else {
      char.x += (dx / dist) * SPEED;
      char.y += (dy / dist) * SPEED;
    }

    char.el.style.left = char.x + 'px';
    char.el.style.top = char.y + 'px';
  }

  requestAnimationFrame(animate);
}

// OneSDKで接続
OneSDK.setup({ mode: 'diff' });
OneSDK.subscribe({
  action: 'comments',
  callback: (comments) => {
    for (const comment of comments) {
      handleComment(comment);
    }
  }
});
OneSDK.connect();

animate();
</script>
</body>
</html>
