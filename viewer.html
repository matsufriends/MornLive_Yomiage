<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Comment Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  .character {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .character .bubble {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: rgba(255, 255, 255, 0.95);
    border-radius: 12px;
    padding: 16px 24px;
    font-size: 28px;
    line-height: 1.4;
    min-width: min-content;
    max-width: 500px;
    word-wrap: break-word;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transform-origin: bottom center;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: pre-wrap;
  }
  .character .bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid rgba(255, 255, 255, 0.95);
  }
  .character .bubble.visible {
    transform: translateX(-50%) scale(1);
  }

  .character .bubble img {
    height: 1.2em;
    vertical-align: middle;
  }

  .character .avatar {
    width: 112px;
    height: 112px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    object-fit: cover;
  }

  .character .name {
    margin-top: 2px;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    text-shadow:
      -2px -2px 0 #000,
       2px -2px 0 #000,
      -2px  2px 0 #000,
       2px  2px 0 #000,
       0   -2px 0 #000,
       0    2px 0 #000,
      -2px  0   0 #000,
       2px  0   0 #000;
    text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>
<script src="http://localhost:11180/templates/preset/__origin/js/onesdk.js"></script>
<script>
const BUBBLE_DURATION = 10000;
const MOVE_INTERVAL_MIN = 2000;
const MOVE_INTERVAL_MAX = 6000;
const SPEED = 1.5;
const FLEE_SPEED = 4;
const EXCITED_SPEED = 5;
const EXCITED_MS_PER_CHAR = 150; // 1文字あたりの興奮時間（ずんだもん読み上げに合わせる）
const PERSONAL_SPACE = 100;
const MARGIN = 112; // アイコン1個分の余白
const CHAR_WIDTH = 140;
const CHAR_HEIGHT = 160;

const BASE_AVATAR_SIZE = 112;
const MIN_AVATAR_SCALE = 0.5;
const MAX_AVATAR_SCALE = 3;

const characters = {};
let totalComments = 0;

function stripHtml(html) {
  return html
    .replace(/<img[^>]*alt="([^"]*)"[^>]*>/g, '$1')
    .replace(/<[^>]+>/g, '');
}

function sanitizeHtml(html) {
  // imgタグは保持（絵文字用）、それ以外のHTMLタグは除去
  return html.replace(/<(?!img\s)[^>]+>/g, '');
}

function handleComment(comment) {
  const userId = comment.data.userId;
  const name = comment.data.nickname || comment.data.displayName || comment.data.name;
  const profileImage = comment.data.profileImage;
  const text = stripHtml(comment.data.comment);

  if (!characters[userId]) {
    createCharacter(userId, name, profileImage);
  }

  showBubble(userId, text);
}

function createCharacter(userId, name, profileImage) {
  // 高解像度画像を取得（YouTube等のs32をs256に置換）
  profileImage = profileImage.replace(/=s\d+/, '=s256');
  const el = document.createElement('div');
  el.className = 'character';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  el.appendChild(bubble);

  const avatar = document.createElement('img');
  avatar.className = 'avatar';
  avatar.src = profileImage;
  avatar.alt = name;
  avatar.crossOrigin = 'anonymous';
  el.appendChild(avatar);

  const nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = name;
  el.appendChild(nameEl);

  const rangeX = Math.max(0, window.innerWidth - CHAR_WIDTH - MARGIN * 2);
  const rangeY = Math.max(0, window.innerHeight - CHAR_HEIGHT - MARGIN * 2);
  const startX = MARGIN + Math.random() * rangeX;
  const startY = MARGIN + Math.random() * rangeY;
  el.style.left = startX + 'px';
  el.style.top = startY + 'px';

  document.body.appendChild(el);

  characters[userId] = {
    el,
    bubble,
    avatar,
    x: startX,
    y: startY,
    targetX: startX,
    targetY: startY,
    moving: false,
    bubbleTimer: null,
    commentCount: 0,
  };

  startWandering(userId);
}

function updateAvatarSizes() {
  if (totalComments === 0) return;
  for (const userId in characters) {
    const char = characters[userId];
    const ratio = char.commentCount / totalComments;
    // MIN_AVATAR_SCALE 〜 MAX_AVATAR_SCALE にスケール
    const scale = MIN_AVATAR_SCALE + ratio * (MAX_AVATAR_SCALE - MIN_AVATAR_SCALE);
    const size = Math.round(BASE_AVATAR_SIZE * scale);
    char.avatar.style.width = size + 'px';
    char.avatar.style.height = size + 'px';
    // 吹き出し位置をアバターサイズに合わせる
    char.bubble.style.bottom = (size + 30) + 'px';
  }
}

function showBubble(userId, rawHtml) {
  const char = characters[userId];
  if (!char) return;

  if (char.bubbleTimer) clearTimeout(char.bubbleTimer);

  const plainText = stripHtml(rawHtml);

  // 吹き出し表示時間：文字数に応じて長く
  const bubbleDuration = Math.max(BUBBLE_DURATION, plainText.length * EXCITED_MS_PER_CHAR);

  // 興奮状態：吹き出しが消えるまで走り回る、文字数が多いほど速い
  char.excitedUntil = Date.now() + bubbleDuration;
  char.excitedSpeed = EXCITED_SPEED + Math.pow(plainText.length, 2) * 0.01;

  // フォントサイズ調整：4行以上になりそうなら縮小
  const baseSize = 28;
  const maxCharsPerLine = 12;
  const lines = Math.ceil(plainText.length / maxCharsPerLine);
  if (lines > 4) {
    const scale = Math.max(0.5, 4 / lines);
    char.bubble.style.fontSize = Math.round(baseSize * scale) + 'px';
  } else {
    char.bubble.style.fontSize = baseSize + 'px';
  }

  char.bubble.innerHTML = sanitizeHtml(rawHtml);
  char.bubble.classList.add('visible');

  char.bubbleTimer = setTimeout(() => {
    char.bubble.classList.remove('visible');
    char.bubbleTimer = null;
  }, bubbleDuration);
}

function startWandering(userId) {
  const wander = () => {
    const char = characters[userId];
    if (!char) return;

    const delay = MOVE_INTERVAL_MIN + Math.random() * (MOVE_INTERVAL_MAX - MOVE_INTERVAL_MIN);

    setTimeout(() => {
      if (!characters[userId]) return;

      if (Math.random() < 0.5) {
        wander();
        return;
      }

      const maxX = window.innerWidth - CHAR_WIDTH - MARGIN;
      const maxY = window.innerHeight - CHAR_HEIGHT - MARGIN;
      char.targetX = MARGIN + Math.random() * (maxX - MARGIN);
      char.targetY = MARGIN + Math.random() * (maxY - MARGIN);
      char.moving = true;

      wander();
    }, delay);
  };

  wander();
}

function animate() {
  const ids = Object.keys(characters);

  for (const userId of ids) {
    const char = characters[userId];

    // 全脅威を合算して最適な逃げ方向を決定
    const charRadius = (char.avatar.offsetWidth || BASE_AVATAR_SIZE) / 2;
    let fleeX = 0, fleeY = 0;
    let threatened = false;
    for (const otherId of ids) {
      if (otherId === userId) continue;
      const other = characters[otherId];
      const dx = char.x - other.x;
      const dy = char.y - other.y;
      const centerDist = Math.sqrt(dx * dx + dy * dy);
      if (centerDist === 0) continue;
      const otherRadius = (other.avatar.offsetWidth || BASE_AVATAR_SIZE) / 2;
      const gap = centerDist - charRadius - otherRadius;
      if (gap < PERSONAL_SPACE && char.commentCount <= other.commentCount) {
        // 近いほど強い反発力
        const force = (PERSONAL_SPACE - gap) / PERSONAL_SPACE;
        fleeX += (dx / centerDist) * force;
        fleeY += (dy / centerDist) * force;
        threatened = true;
      }
    }
    if (threatened) {
      // 壁からの反発も加味
      const wallForce = 0.5;
      if (char.x < MARGIN + charRadius) fleeX += wallForce;
      if (char.x > window.innerWidth - CHAR_WIDTH - MARGIN - charRadius) fleeX -= wallForce;
      if (char.y < MARGIN + charRadius) fleeY += wallForce;
      if (char.y > window.innerHeight - CHAR_HEIGHT - MARGIN - charRadius) fleeY -= wallForce;

      const fleeMag = Math.sqrt(fleeX * fleeX + fleeY * fleeY);
      if (fleeMag > 0) {
        const fleeDistance = (PERSONAL_SPACE + charRadius) * 1.5;
        const awayX = char.x + (fleeX / fleeMag) * fleeDistance;
        const awayY = char.y + (fleeY / fleeMag) * fleeDistance;
        char.targetX = Math.max(MARGIN, Math.min(window.innerWidth - CHAR_WIDTH - MARGIN, awayX));
        char.targetY = Math.max(MARGIN, Math.min(window.innerHeight - CHAR_HEIGHT - MARGIN, awayY));
        char.moving = true;
        char.fleeing = true;
      }
    }

    // 重なり防止: アバター同士が重なったら即座に押し出す
    for (const otherId of ids) {
      if (otherId === userId) continue;
      const other = characters[otherId];
      const dx = char.x - other.x;
      const dy = char.y - other.y;
      const centerDist = Math.sqrt(dx * dx + dy * dy);
      if (centerDist === 0) continue;
      const otherRadius = (other.avatar.offsetWidth || BASE_AVATAR_SIZE) / 2;
      const overlap = charRadius + otherRadius - centerDist;
      if (overlap > 0) {
        const pushX = (dx / centerDist) * overlap * 0.5;
        const pushY = (dy / centerDist) * overlap * 0.5;
        char.x += pushX;
        char.y += pushY;
        other.x -= pushX;
        other.y -= pushY;
      }
    }

    const isExcited = char.excitedUntil && Date.now() < char.excitedUntil;

    // 興奮中は常に走り回る
    if (isExcited && !char.moving) {
      const maxX = window.innerWidth - CHAR_WIDTH - MARGIN;
      const maxY = window.innerHeight - CHAR_HEIGHT - MARGIN;
      char.targetX = MARGIN + Math.random() * (maxX - MARGIN);
      char.targetY = MARGIN + Math.random() * (maxY - MARGIN);
      char.moving = true;
    }

    if (!char.moving) {
      char.el.style.left = char.x + 'px';
      char.el.style.top = char.y + 'px';
      continue;
    }

    const dx = char.targetX - char.x;
    const dy = char.targetY - char.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = isExcited ? (char.excitedSpeed || EXCITED_SPEED) : (char.fleeing ? FLEE_SPEED : SPEED);

    if (dist < speed) {
      char.x = char.targetX;
      char.y = char.targetY;
      char.moving = false;
      char.fleeing = false;
    } else {
      char.x += (dx / dist) * speed;
      char.y += (dy / dist) * speed;
    }

    char.el.style.left = char.x + 'px';
    char.el.style.top = char.y + 'px';
  }

  requestAnimationFrame(animate);
}

// OneSDKで接続
const seenCommentIds = new Set();
OneSDK.setup({ mode: 'all' });
OneSDK.subscribe({
  action: 'comments',
  callback: (comments) => {
    for (const comment of comments) {
      const commentId = comment.data.id;
      const userId = comment.data.userId;
      const name = comment.data.nickname || comment.data.displayName || comment.data.name;
      const profileImage = comment.data.profileImage;
      if (!characters[userId]) {
        createCharacter(userId, name, profileImage);
      }
      // 未処理のコメントだけカウント＆吹き出し表示
      if (!seenCommentIds.has(commentId)) {
        seenCommentIds.add(commentId);
        characters[userId].commentCount++;
        totalComments++;
        showBubble(userId, comment.data.comment);
      }
    }
    updateAvatarSizes();
  }
});
OneSDK.connect();

animate();
</script>
</body>
</html>
